{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center align-items-center w-100 m-0" style="min-height: 75vh;">
    <div class="col-md-8 col-lg-6 col-xl-5">
        
        <div class="card shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-2 text-primary">Change Password</h3>
                </div>

                <form method="POST" action="{% url 'change_password' %}" id="changePasswordForm" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Old Password <span class="text-danger">*</span></label>
                        <input type="password" name="old_password" class="form-control bg-light p-2" placeholder="Enter old password" required>
                        <div class="invalid-feedback">Please enter your current password.</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small text-uppercase">New Password <span class="text-danger">*</span></label>
                        
                        <div class="input-group has-validation">
                            <input type="password" id="newPasswordInput" name="new_password" class="form-control bg-light border-end-0 p-2" placeholder="Enter new password" minlength="8" required>
                            <button class="btn border border-start-0 bg-light text-muted" type="button" id="toggleNewPwdBtn">
                                <i class="bi bi-eye-slash-fill" id="toggleNewPwdIcon"></i>
                            </button>
                            <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                        </div>
                        
                        <div class="progress mt-2" style="height: 6px; border-radius: 10px; background-color: #e9ecef;">
                            <div id="password-strength-bar" class="progress-bar" role="progressbar" style="width: 0%; transition: width 0.4s ease, background-color 0.4s ease;"></div>
                        </div>
                        <div class="form-text small mt-1 d-flex justify-content-between">
                            <span>Strength: <span id="password-strength-text" class="fw-bold text-muted">None</span></span>
                            <span class="text-muted" style="font-size: 0.75rem;">(Needs 8+ chars, letters & numbers)</span>
                        </div>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Confirm New Password <span class="text-danger">*</span></label>
                        
                        <div class="input-group has-validation">
                            <input type="password" id="confirmPasswordInput" name="confirm_password" class="form-control bg-light border-end-0 p-2" placeholder="Confirm new password" required>
                            <button class="btn border border-start-0 bg-light text-muted" type="button" id="toggleConfirmPwdBtn">
                                <i class="bi bi-eye-slash-fill" id="toggleConfirmPwdIcon"></i>
                            </button>
                            <div class="invalid-feedback" id="confirmPasswordFeedback">Please confirm your new password.</div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 shadow-sm">
                        Update Password
                    </button>
                </form>

            </div>
        </div>
        
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. SMART FORM VALIDATION & PASSWORD MATCH CHECK
    const form = document.getElementById('changePasswordForm');
    const newPwd = document.getElementById('newPasswordInput');
    const confirmPwd = document.getElementById('confirmPasswordInput');
    const confirmFeedback = document.getElementById('confirmPasswordFeedback');

    form.addEventListener('submit', function(event) {
        if (newPwd.value !== confirmPwd.value) {
            confirmPwd.setCustomValidity("Passwords do not match.");
            confirmFeedback.textContent = "Passwords do not match.";
        } else {
            confirmPwd.setCustomValidity(""); 
            confirmFeedback.textContent = "Please confirm your new password.";
        }

        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }
        form.classList.add('was-validated');
    }, false);


    // 2. TOGGLE PASSWORD VISIBILITY LOGIC
    function setupPasswordToggle(btnId, inputId, iconId) {
        const toggleBtn = document.getElementById(btnId);
        const pwdInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(iconId);

        toggleBtn.addEventListener('click', function() {
            const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
            pwdInput.setAttribute('type', type);
            
            if (type === 'text') {
                toggleIcon.classList.remove('bi-eye-slash-fill');
                toggleIcon.classList.add('bi-eye-fill', 'text-primary');
            } else {
                toggleIcon.classList.remove('bi-eye-fill', 'text-primary');
                toggleIcon.classList.add('bi-eye-slash-fill');
            }
        });
    }

    setupPasswordToggle('toggleNewPwdBtn', 'newPasswordInput', 'toggleNewPwdIcon');
    setupPasswordToggle('toggleConfirmPwdBtn', 'confirmPasswordInput', 'toggleConfirmPwdIcon');


    // 3. PASSWORD STRENGTH LOGIC
    const pwdBar = document.getElementById('password-strength-bar');
    const pwdText = document.getElementById('password-strength-text');

    newPwd.addEventListener('input', function() {
        const val = newPwd.value;
        let strength = 0;

        if (val.length > 0) strength += 1;
        if (val.length >= 8) strength += 1; 
        if (/[A-Z]/.test(val)) strength += 1; 
        if (/[0-9]/.test(val)) strength += 1; 
        if (/[^A-Za-z0-9]/.test(val)) strength += 1; 

        if (val.length === 0) {
            pwdBar.style.width = '0%';
            pwdBar.className = 'progress-bar';
            pwdText.textContent = 'None';
            pwdText.className = 'fw-bold text-muted';
        } 
        else if (strength <= 2) {
            pwdBar.style.width = '33%';
            pwdBar.className = 'progress-bar bg-danger'; 
            pwdText.textContent = 'Weak';
            pwdText.className = 'fw-bold text-danger';
        } 
        else if (strength <= 4) {
            pwdBar.style.width = '66%';
            pwdBar.className = 'progress-bar bg-warning'; 
            pwdText.textContent = 'Medium';
            pwdText.className = 'fw-bold text-warning';
        } 
        else {
            pwdBar.style.width = '100%';
            pwdBar.className = 'progress-bar bg-success'; 
            pwdText.textContent = 'Strong';
            pwdText.className = 'fw-bold text-success';
        }
        
        if (confirmPwd.value && newPwd.value === confirmPwd.value) {
            confirmPwd.setCustomValidity("");
        }
    });
    
    confirmPwd.addEventListener('input', function() {
        if (newPwd.value === confirmPwd.value) {
            confirmPwd.setCustomValidity("");
        }
    });

});
</script>

{% endblock %}
