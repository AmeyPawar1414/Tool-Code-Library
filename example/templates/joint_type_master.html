{% extends "base.html" %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow p-4" style="max-width:800px; margin:auto;">

        <h3 class="text-primary mb-4">Joint Type Master</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="jointTypeInput" class="form-label">Joint Type</label>
                </div>

                <div class="col-md-8">
                    <input type="text" id="jointTypeInput" name="joint_type" class="form-control" placeholder="Enter Joint type" required>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
            </div>

        </form>
        
        <hr class="mt-5">

        <h4 class="mt-4 mb-3">Saved Joint Types</h4>

        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead class="table-primary">
                    <tr>
                        <th>Joint Type</th>
                        <th style="width: 100px;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for joint in joint_types %}
                    <tr>
                        <td class="align-middle">{{ joint.joint_type_name }}</td>
                        <td>
                            <form action="{% url 'delete_joint_type' joint.id %}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete the joint type: {{ joint.joint_type_name }}?');">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center text-muted py-3">No joint types saved yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
    </div>
</div>

{% endblock %}
