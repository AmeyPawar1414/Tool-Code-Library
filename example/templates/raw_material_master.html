{% extends "base.html" %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="card shadow p-4" style="max-width:800px; margin:auto;">

        <h3 class="text-primary mb-4">Raw Material Master</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="rawMaterialInput" class="form-label">Raw Material</label>
                </div>

                <div class="col-md-8">
                    <input type="text" id="rawMaterialInput" name="raw_material" class="form-control" placeholder="Enter Raw Material" required>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
            </div>

        </form>
        
        <hr class="mt-5">

        <h4 class="mb-3">Saved Raw Materials</h4>

        <table class="table table-bordered table-striped">
            <thead class="table-primary">
                <tr>
                    <th>Raw Material</th>
                    <th style="width: 100px;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for material in materials %}
                <tr>
                    <td class="align-middle">{{ material.raw_material_name }}</td>
                    <td>
                        <form action="{% url 'delete_raw_material' material.id %}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete {{ material.raw_material_name }}?');">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted py-3">No raw materials saved yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
