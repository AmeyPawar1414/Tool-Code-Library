<!DOCTYPE html>
<html>
<head>
    <title>Login | Tool Code Library</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 380px;
            border-radius: 15px;
            padding: 30px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-title {
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
            color: #2a5298;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn-custom {
            background: #2a5298;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #1e3c72;
            transform: scale(1.02);
        }

        .footer-text {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h3 class="login-title">Tool Code Library</h3>

    <form method="POST">
    {% csrf_token %}

    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

        <div class="mb-3">
            <label for="usernameInput" class="form-label">Username</label>
            <input type="text" id="usernameInput" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label for="passwordInput" class="form-label">Password</label>
            <input type="password" id="passwordInput" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-custom text-white">
                Login
            </button>
        </div>

        <div class="footer-text">
            © 2026 Tool Code Library
        </div>

    </form>

</div>

</body>
</html>
