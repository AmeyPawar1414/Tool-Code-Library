{% extends 'base.html' %}

{% block content %}

<style>
    .password-card {
        max-width: 450px;
        margin: 60px auto;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        padding: 30px;
        background-color: #ffffff;
    }
    .password-title {
        color: #2a5298;
        font-weight: 600;
    }
    .btn-update {
        background: linear-gradient(90deg, #2a5298, #1e3c72);
        border: none;
        color: white;
    }
    .btn-update:hover {
        opacity: 0.9;
        color: white;
    }
</style>

<div class="container">
<div class="password-card">

    <h3 class="text-center password-title mb-4">Change Password</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'change_password' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label for="oldPasswordInput" class="form-label">Old Password</label>
            <input type="password" id="oldPasswordInput" name="old_password" class="form-control" placeholder="Enter old password" required>
        </div>

        <div class="mb-3">
            <label for="newPasswordInput" class="form-label">New Password</label>
            <input type="password" id="newPasswordInput" name="new_password" class="form-control" placeholder="Enter new password" minlength="8" required>
        </div>

        <div class="mb-4">
            <label for="confirmPasswordInput" class="form-label">Confirm New Password</label>
            <input type="password" id="confirmPasswordInput" name="confirm_password" class="form-control" placeholder="Confirm new password" minlength="8" required>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-update">Update Password</button>
        </div>

    </form>

</div>
</div>

{% endblock %}
